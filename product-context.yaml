    description:
      what_changes: "When only the abstract is available (no arXiv HTML/full text — common for freshly-published papers), the digestor currently invents specific quantitative results (benchmark scores, comparison tables) absent from the abstract. The digestor must detect full-text availability and, when abstract-only, ground the Digest strictly in the abstract (no invented numbers/baselines) OR mark the paper full-text-unavailable so the orchestrator can defer/flag it. The stylist must not add numbers."
