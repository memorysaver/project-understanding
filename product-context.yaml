    acceptance_criteria:
      - "Digestor distinguishes full-text vs abstract-only and records which source kind backed the Digest."
      - "On abstract-only input, the Digest contains no specific numeric/benchmark claim absent from the abstract (test: an abstract with no numbers -> digest invents no numbers)."
      - "Orchestrator can defer or flag a paper whose full text is unavailable (decision recorded)."
