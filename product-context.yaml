    technical_notes: "Found via the L0 gate re-run on abstract-only papers (2026-06-15). Likely needs a source_kind (full_text|abstract) signal threaded digestor->digest, and a policy to defer abstract-only papers until ar5iv HTML renders."
    verification:
      unit: ["abstract-only digest invents no numbers", "full-text vs abstract-only detection"]
      integration: []
      contract: []

