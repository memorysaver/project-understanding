# ─── TOPOLOGY (/map Step 4) ──────────────────────────────────
topology:
  roles:
    - name: implementer
      purpose: "Takes a story spec and produces code + tests + PR."
      does: ["implement", "unit test", "contract test", "submit PR"]
      does_not: ["decide scope", "modify architecture", "skip tests"]
      input_contract:
        story_spec: "Full story from stories section"
        context_slice:
          context_document: "Pruned to: problem, constraints, relevant layer"
          system_map_module: "This story's module definition + technical-spec section"
          adjacent_interfaces: "Interface contracts where from/to matches this module"
          dependency_artifacts: "Public API surface from completed dependencies"
      output_contract:
        implementation:
          branch_name: "string"
          files_changed: "FileDiff[]"
          pr_url: "string"
        verification:
          unit_tests: "TestResult[]"
          contract_tests: "TestResult[]"
          all_passing: "boolean"
        status_report:
          story_id: "string"
          outcome: "success | failure"
          error_summary: "string (if failure)"
          what_was_not_tried: "string[]"
      context_composition:
        - "Story spec (full)"
        - "Context Document (pruned: problem, constraints, relevant layer)"
        - "System Map (story's module + adjacent interfaces) + docs/technical-spec.md section"
        - "Dependency artifacts (public API surface only)"
      cost_budget:
        input_tokens_max: 60000
        output_tokens_max: 24000
        alert_threshold_total: 120000
    - name: evaluator
      purpose: "Independently verifies the implementation against the story spec + contracts before PR merge."
      does: ["run acceptance + contract tests", "check interface compliance", "report verdict"]
      does_not: ["write feature code", "expand scope"]
      input_contract:
        story_spec: "Full story"
        context_slice:
          adjacent_interfaces: "Contracts this story implements/consumes"
      output_contract:
        verdict:
          story_id: "string"
          all_acceptance_met: "boolean"
          contract_compliant: "boolean"
          findings: "string[]"
      context_composition:
        - "Story spec (full)"
        - "Diff + test results"
      cost_budget:
        input_tokens_max: 40000
        output_tokens_max: 12000
        alert_threshold_total: 80000
  routing:
    dispatch: fifo_within_slice
    concurrency_limit: 5
    conflict_detection: files_affected_overlap
    retry: "2x same agent -> failure analyst -> fresh agent -> human escalation"
    autonomous: true
    auto_design: false
    skip_human_eval: none
  handoffs:
    - from: implementer
      to: evaluator
      trigger: implementation_complete
      payload: "eval-request.md + code diff + contracts.md + feature-verification.json"
      validation:
        - "All tasks committed on the feature branch"
        - "Dev server running and accessible"
        - "eval-request.md created with round number and change summary"
      on_validation_failure: "reject handoff, notify source agent"

# ─── COST TRACKING ───────────────────────────────────────────
