# ─── ARCHITECTURE (/map Step 1) ──────────────────────────────
architecture:
  style: "Serverless modular monolith on Cloudflare Workers; pipeline stages decoupled via Cloudflare Queues + durable D1 intermediates."
  overview: "The web UI (reader + console) calls a Hono Worker over oRPC; the Worker also hosts Queue consumers and a Cron handler. The ingestion pipeline (crawler -> digestor -> stylist -> publisher) is coordinated by an orchestrator using Queues for stage handoffs and D1 for durable per-stage state, so stages are swappable and retries idempotent. An llm module wraps OpenRouter so models swap per stage."
  technical_spec: "docs/technical-spec.md"
  modules:
    - name: db
      responsibility: "Cloudflare D1 schema, migrations, and typed Drizzle accessors for all entities."
      does_not: "Contain business or pipeline logic."
      owns: ["All persisted entities (Paper, Digest, StylePrompt, Post, Run, auth tables)"]
      depends_on: []
      technology: "Drizzle ORM on Cloudflare D1"
      key_concepts: ["Paper state machine", "arxiv_id dedup key", "single active StylePrompt"]
    - name: llm
      responsibility: "Thin OpenRouter (OpenAI-compatible) client; per-stage model config from env; structured-output + usage reporting."
      does_not: "Contain digest/style business logic."
      owns: ["LLM provider integration boundary"]
      depends_on: ["env"]
      technology: "OpenAI-compatible client pointed at OpenRouter"
      key_concepts: ["per-stage model selection", "structured output", "token usage for cost"]
    - name: crawler
      responsibility: "Discover new arXiv papers, dedup by arxiv_id, persist Paper metadata + source URLs."
      does_not: "Fetch full text, digest, or style."
      owns: ["Paper discovery + dedup"]
      depends_on: ["db"]
      technology: null
      key_concepts: ["arXiv API/Atom", "rate limiting (~1 req/3s)", "ON CONFLICT DO NOTHING"]
    - name: digestor
      responsibility: "Fetch full paper text (arXiv HTML/LaTeX source; offload PDF) and produce a structured Digest via the llm module."
      does_not: "Apply any voice/style; decide publish state."
      owns: ["Digest records"]
      depends_on: ["db", "llm"]
      technology: null
      key_concepts: ["full-text fetch", "structured digest (contributions/methods/results)"]
    - name: stylist
      responsibility: "Rewrite a Digest into a styled post body using the active StylePrompt via the llm module."
      does_not: "Fetch papers; persist the final Post or decide its state."
      owns: ["Styled body generation"]
      depends_on: ["db", "llm"]
      technology: null
      key_concepts: ["active StylePrompt", "voice consistency"]
    - name: publisher
      responsibility: "Assemble and persist a Post (title, body, citation, link) and manage publish/unpublish state."
      does_not: "Generate content."
      owns: ["Post lifecycle/state"]
      depends_on: ["db"]
      technology: null
      key_concepts: ["Post status (published/unpublished/draft)", "citation"]
    - name: orchestrator
      responsibility: "Coordinate the pipeline: Queue handoffs, Paper state machine, manual run trigger (L1), Cron producer (L2), retries."
      does_not: "Implement individual stage logic."
      owns: ["Run/job state", "pipeline state transitions"]
      depends_on: ["db", "crawler", "digestor", "stylist", "publisher"]
      technology: "Cloudflare Queues + Cron Triggers"
      key_concepts: ["one message per (paper, stage)", "idempotent stages", "resume-from-stage"]
    - name: api
      responsibility: "oRPC routers: reader queries (public) and console mutations (auth-gated)."
      does_not: "Run pipeline work or render UI."
      owns: ["RPC contract"]
      depends_on: ["db", "auth", "orchestrator"]
      technology: "oRPC"
      key_concepts: ["public vs auth-gated procedures", "no unpublished content leaks"]
    - name: auth
      responsibility: "Better Auth — owner authentication for the console."
      does_not: "Gate the reader side."
      owns: ["Sessions"]
      depends_on: ["db"]
      technology: "Better Auth"
      key_concepts: ["owner-only console", "cross-subdomain cookie config"]
    - name: web
      responsibility: "React UI: reader surface (feed + article, public) and console surface (prompt editor, run-now, auth-gated)."
      does_not: "Contain backend logic."
      owns: ["UI"]
      depends_on: ["api", "auth"]
      technology: "React 19 + Vite + TanStack Router"
      key_concepts: ["reader feed/article", "console prompt editor"]
    - name: server
      responsibility: "Hono Worker host: wires oRPC + auth + Queue consumers + Cron handler; owns runtime bindings."
      does_not: "Contain domain logic."
      owns: ["Runtime bindings (D1, Queues, Cron, secrets)"]
      depends_on: ["api", "auth", "orchestrator"]
      technology: "Hono on Cloudflare Workers"
      key_concepts: ["fetch handler", "queue() consumer", "scheduled() cron handler"]
  domain_model:
    - name: Paper
      purpose: "A source paper discovered from arXiv that flows through the pipeline."
      fields:
        - name: arxiv_id
          type: string
          default: null
          required: true
          notes: "Primary/UNIQUE key; the dedup key."
        - name: status
          type: enum
          default: discovered
          required: true
          notes: "discovered | digested | styled | published | failed (see state machine)."
      normalization_rules: ["arxiv_id stored canonical (e.g. 2401.01234)"]
      invariants: ["A published Paper has a corresponding published Post."]
    - name: StylePrompt
      purpose: "The prompt that defines PaperLens's voice; the Stylist uses the active one."
      fields:
        - name: id
          type: string
          default: null
          required: true
          notes: "Stable id."
        - name: is_active
          type: boolean
          default: false
          required: true
          notes: "Exactly one row is active in MVP; updating active is a transactional flip."
      normalization_rules: []
      invariants: ["Exactly one StylePrompt has is_active = true."]
    - name: Post
      purpose: "A published blog post derived from a Paper's digest, in the owner's voice."
      fields:
        - name: id
          type: string
          default: null
          required: true
          notes: "Stable id."
        - name: status
          type: enum
          default: draft
          required: true
          notes: "published | unpublished | draft."
        - name: tags
          type: json
          default: null
          required: false
          notes: "Null at Layer 0; added at Layer 2."
      normalization_rules: []
      invariants: ["A published Post has a non-null published_at."]
  protocol_sequences:
    - name: ingest-pipeline
      participants: ["orchestrator", "crawler", "digestor", "stylist", "publisher"]
      trigger: "Manual run (L1) or Cron (L2) calls orchestrator.enqueueDiscovery."
      steps:
        - sender: orchestrator
          message_type: "discover"
          timeout_ms: 30000
          payload_example: '{"type":"discover","runId":"r1"}'
        - sender: crawler
          message_type: "digest"
          timeout_ms: 60000
          payload_example: '{"type":"digest","arxiv_id":"2401.01234","runId":"r1"}'
        - sender: digestor
          message_type: "style"
          timeout_ms: 60000
          payload_example: '{"type":"style","arxiv_id":"2401.01234","runId":"r1"}'
        - sender: stylist
          message_type: "publish"
          timeout_ms: 30000
          payload_example: '{"type":"publish","arxiv_id":"2401.01234","runId":"r1"}'
      error_behavior: "After max_retries on a stage, set Paper status=failed, record failure, escalate per failure class."
      timeout_behavior: "Stage throws on budget exceed; Queue redelivers with backoff from the last good intermediate."
  interfaces:
    - from: web
      to: api
      protocol: "oRPC over HTTP"
      endpoint: "listPosts, getPost (public); getActivePrompt, updateActivePrompt, triggerRun, setPostStatus, previewRewrite (auth)"
      request: {}
      response: {}
      errors:
        - code: 401
          meaning: "Unauthorized console call"
        - code: 404
          meaning: "Post not found / not published"
      sla: null
    - from: api
      to: orchestrator
      protocol: "function call"
      endpoint: "enqueueDiscovery(trigger)"
      request: {}
      response: {}
      errors: []
      sla: null
    - from: orchestrator
      to: digestor
      protocol: "message queue"
      endpoint: "pipeline queue message { type, arxiv_id, runId }"
      request: {}
      response: {}
      errors: []
      sla: null
    - from: digestor
      to: llm
      protocol: "function call"
      endpoint: "llm.complete({ stage, messages, schema? })"
      request: {}
      response: {}
      errors:
        - code: 502
          meaning: "OpenRouter upstream failure -> retry with backoff"
      sla: null
    - from: crawler
      to: db
      protocol: "function call"
      endpoint: "insert Paper ON CONFLICT DO NOTHING"
      request: {}
      response: {}
      errors: []
      sla: null
  data_flows:
    - journey: "Ingest to publish (owner)"
      path: "trigger Run -> orchestrator -> crawler -> [queue] -> digestor -> [queue] -> stylist -> [queue] -> publisher -> Post published -> feed"
    - journey: "Reading (reader, public)"
      path: "web feed -> api.listPosts -> db; article -> api.getPost -> db"
    - journey: "Curation (owner, auth)"
      path: "web console -> api.getActivePrompt/updateActivePrompt -> db; api.triggerRun -> orchestrator"
  third_party:
    - name: arXiv
      provides: "Paper discovery, metadata, and full text (HTML/LaTeX source preferred; PDF offloaded)."
      integration_point: "crawler (discovery/metadata), digestor (full text)"
      failure_mode: "Skip tick + retry next cadence; honor ~1 req/3s rate limit."
    - name: OpenRouter
      provides: "LLM inference via OpenAI-compatible API for digestor + stylist."
      integration_point: "llm module"
      failure_mode: "Backoff retry; leave Paper at current stage; escalate after N."
  deployment:
    environments: ["local", "production"]
    module_runtime: { "server": "cloudflare-workers", "web": "cloudflare-static" }
    persistence: { "all": "cloudflare-d1", "large_fulltext": "cloudflare-r2 (optional)" }
  amendment_log: []
  adrs:
    - id: ADR-001
      title: "Queue + durable-intermediate pipeline over in-process chaining"
      context: "Cloudflare Workers cannot run the full crawl->digest->style->publish chain for many papers in one invocation (subrequest/stage limits)."
      decision: "Coordinate stages via Cloudflare Queues with per-stage durable intermediates in D1; one LLM call per message."
      reasoning: "Keeps each invocation within limits; makes retries idempotent and stages swappable."
      consequences: "Enables scale + resilience; adds a queue/state-machine to build (deferred past the L0 inline skeleton)."
    - id: ADR-002
      title: "Isolate OpenRouter behind an llm module"
      context: "Owner wants to vary models per stage via OpenRouter (OpenAI-compatible)."
      decision: "A thin llm module wraps the OpenAI-compatible client; model per stage from env."
      reasoning: "Swappable models, testable boundary, single place for usage/cost capture."
      consequences: "Stages depend on llm, not on a provider SDK."
    - id: ADR-003
      title: "D1 for state, Queues for the job queue"
      context: "D1 (SQLite) is single-writer and weak as a job queue under concurrent retries."
      decision: "Use D1 for state/results (with arxiv_id UNIQUE dedup); use Cloudflare Queues for the job queue."
      reasoning: "Queues give at-least-once delivery, retries, and DLQ for free."
      consequences: "Two infra primitives, but clean separation of state vs work."

