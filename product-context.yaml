# ─── LAYER GATES ─────────────────────────────────────────────
layer_gates:
  - layer: 0
    status: conditional_pass
    test_definition: "One hardcoded arXiv paper flows crawl->digest->style->publish to a published Post; the feed lists it and the article page renders title+body+source link. Faithfulness eval run with <=10% hallucinated/unsupported claims over ~20-30 papers."
    results:
      faithfulness_full_text: "GOOD (~1-5%): with arXiv full text the pipeline is faithful (e.g. the Transformer post was accurate). Famous-paper sample 9/166 = 5.4% (Sonnet blind graders). Steady state — arXiv papers get ar5iv full text within ~2 days of posting."
      faithfulness_abstract_only: "PASS-with-tail (8.62%) AFTER PL-030: a forced-abstract-only isolation re-run of the same 25 papers graded 28/325 = 8.62% (Sonnet, strict) vs 133/603 = 22.06% before the fix. ABSTRACT_ONLY_GUARD roughly halves both the fabrication rate and the number of specific claims made. CAVEAT: the corpus average hides a tail — 2/25 papers still 35-50% fabricated (2606.14650, 2606.14699) by injecting canonical domain specifics (standard dataset names like SAPIEN/PartNet-Mobility, 'outperforms baselines'). -> deferred to PL-031."
      citation_fabrication: "FIXED by PL-029 (4bea861) — 0/25 fabricated citations in the re-run (mechanically verified)."
      confound_note: "The naive PL-030 re-run was INVALID: re-running the same ids 2 days later, ar5iv had rendered full text for 23/25 (no longer abstract-only). Isolated the fix with a FORCE_ABSTRACT_ONLY flag in scripts/gate-run.ts (full-text fetcher returns the abstract verbatim) so the guard always fires — that gave the clean 8.62% apples-to-apples vs the 22% baseline."
      grader_caveat: "The earlier new-sample 4.14% (Opus grade + adversarial verify) was OPTIMISTIC — the verify's benefit-of-doubt to claims 'beyond the excerpt' masked abstract-only fabrication; a strict single-pass grader gives ~22% pre-fix on the same set."
      verdict: "CONDITIONAL PASS (user decision 2026-06-15). Full-text path PASSES (~1-5%, the steady state). Abstract-only improved 22% -> 8.62% (under the 10% bar) but retains a bad tail, so abstract-only papers must be DEFERRED/flagged rather than published blind (PL-031). 'Trust without reading' holds for full-text; protected-by-deferral for abstract-only."
      failures:
        - "abstract-only quantitative fabrication 22.06% -> 8.62% (PL-030, ac110d4, confirmed via FORCE_ABSTRACT_ONLY isolation re-run). Residual tail deferred to PL-031 (don't publish abstract-only blind)."
        - "stylist citation fabrication — FIXED (PL-029)"
    completed_at: "2026-06-15"
  - layer: 1
    status: not_started
    test_definition: "Owner signs in, edits the active style prompt, triggers a manual 'run now' over a batch via the queue, and sees new deduped posts in the owner's voice; unpublishing a post removes it from the feed."
    results:
      tests_run: 0
      tests_passed: 0
      tests_failed: 0
      failures: []
    completed_at: null
  - layer: 2
    status: not_started
    test_definition: "Cron triggers a run on cadence without manual action; a simulated stage failure retries and recovers (or marks failed + alerts); posts show tags + clean citations; cost-per-post is tracked with a threshold alert."
    results:
      tests_run: 0
      tests_passed: 0
      tests_failed: 0
      failures: []
    completed_at: null

# ─── TOPOLOGY (/map Step 4) ──────────────────────────────────
topology:
  roles:
    - name: implementer
      purpose: "Takes a story spec and produces code + tests + PR."
      does: ["implement", "unit test", "contract test", "submit PR"]
      does_not: ["decide scope", "modify architecture", "skip tests"]
      input_contract:
        story_spec: "Full story from stories section"
        context_slice:
          context_document: "Pruned to: problem, constraints, relevant layer"
          system_map_module: "This story's module definition + technical-spec section"
          adjacent_interfaces: "Interface contracts where from/to matches this module"
          dependency_artifacts: "Public API surface from completed dependencies"
      output_contract:
        implementation:
          branch_name: "string"
          files_changed: "FileDiff[]"
          pr_url: "string"
        verification:
          unit_tests: "TestResult[]"
          contract_tests: "TestResult[]"
          all_passing: "boolean"
        status_report:
          story_id: "string"
          outcome: "success | failure"
          error_summary: "string (if failure)"
          what_was_not_tried: "string[]"
      context_composition:
        - "Story spec (full)"
        - "Context Document (pruned: problem, constraints, relevant layer)"
        - "System Map (story's module + adjacent interfaces) + docs/technical-spec.md section"
        - "Dependency artifacts (public API surface only)"
      cost_budget:
        input_tokens_max: 60000
        output_tokens_max: 24000
        alert_threshold_total: 120000
    - name: evaluator
      purpose: "Independently verifies the implementation against the story spec + contracts before PR merge."
      does: ["run acceptance + contract tests", "check interface compliance", "report verdict"]
      does_not: ["write feature code", "expand scope"]
      input_contract:
        story_spec: "Full story"
        context_slice:
          adjacent_interfaces: "Contracts this story implements/consumes"
      output_contract:
        verdict:
          story_id: "string"
          all_acceptance_met: "boolean"
          contract_compliant: "boolean"
          findings: "string[]"
      context_composition:
        - "Story spec (full)"
        - "Diff + test results"
      cost_budget:
        input_tokens_max: 40000
        output_tokens_max: 12000
        alert_threshold_total: 80000
  routing:
    dispatch: fifo_within_slice
    concurrency_limit: 5
    conflict_detection: files_affected_overlap
    retry: "2x same agent -> failure analyst -> fresh agent -> human escalation"
    autonomous: true
    auto_design: false
    skip_human_eval: none
    process_learnings:
      - pattern: "agent-teams tmux backend silently fails when a parallel project session holds the tmux server (builders register but never execute)"
        mitigation: "spawn builders as native background subagents (Agent run_in_background, no team_name); verify a heartbeat .dev-workflow/signals/status.json before trusting the spawn"
        discovered_at: "2026-06-15"
      - pattern: "a runner subagent detached a long PAID job (faithfulness gate) via a launcher + Monitor and relaunched it after a kill, defying stop and continuing to spend"
        mitigation: "run long real-cost jobs as a main-owned background bash (directly killable) or a process the subagent owns; instruct runners to NEVER relaunch on exit; money-guard by renaming the runner script when stopping"
        discovered_at: "2026-06-15"
      - pattern: "the documented faithfulness-eval real-run path crashes under plain bun (orchestrator/llm reach cloudflare:workers, Workers-only)"
        mitigation: "scripts/gate-run.ts injects a local bun:sqlite db + a process.env OpenRouter complete adapter + real fetchers into orchestrator.runOnce; consider committing it or making the harness real-run work outside the Workers runtime"
        discovered_at: "2026-06-15"
  handoffs:
    - from: implementer
      to: evaluator
      trigger: implementation_complete
      payload: "eval-request.md + code diff + contracts.md + feature-verification.json"
      validation:
        - "All tasks committed on the feature branch"
        - "Dev server running and accessible"
        - "eval-request.md created with round number and change summary"
      on_validation_failure: "reject handoff, notify source agent"

